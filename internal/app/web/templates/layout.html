<!DOCTYPE html>
<html lang="ja" x-data="{ darkMode: localStorage.getItem('darkMode') === 'true' }" :class="{ 'dark': darkMode }">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Notion Notifier{{end}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                        },
                    },
                }
            }
        }
    </script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/htmx.org/dist/ext/json-enc.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        [x-cloak] {
            display: none !important;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .dark .glass {
            background: rgba(15, 23, 42, 0.7);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
    </style>
</head>

<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans transition-colors duration-300"
    x-data="{ sidebarOpen: false }">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
            class="fixed inset-y-0 left-0 z-50 w-72 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 transition-transform duration-300 transform lg:translate-x-0 lg:static lg:inset-0 shadow-2xl lg:shadow-none">

            <div class="flex items-center justify-between h-20 px-8">
                <span
                    class="text-2xl font-extrabold tracking-tight text-primary-600 dark:text-primary-400 flex items-center gap-3">
                    <div class="p-2 bg-primary-100 dark:bg-primary-900/50 rounded-xl">
                        <i data-lucide="bell" class="w-6 h-6"></i>
                    </div>
                    Notifier
                </span>
                <button @click="sidebarOpen = false"
                    class="lg:hidden p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-500">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <div class="px-4 py-6 space-y-8 overflow-y-auto h-[calc(100vh-80px)]">
                <div>
                    <h3
                        class="px-4 mb-4 text-xs font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-widest">
                        Menu</h3>
                    <nav class="space-y-1">
                        <a href="/"
                            class="group flex items-center px-4 py-3 text-sm font-semibold rounded-xl transition-all {{if eq .Page "dashboard"}}bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400 shadow-sm{{else}}text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white{{end}}">
                            <i data-lucide="layout-dashboard"
                                class="w-5 h-5 mr-3 transition-transform group-hover:scale-110"></i>
                            ダッシュボード
                        </a>
                        <a href="/notifications"
                            class="group flex items-center px-4 py-3 text-sm font-semibold rounded-xl transition-all {{if eq .Page "notifications"}}bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400 shadow-sm{{else}}text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white{{end}}">
                            <i data-lucide="message-square"
                                class="w-5 h-5 mr-3 transition-transform group-hover:scale-110"></i>
                            通知設定
                        </a>
                        <a href="/calendar"
                            class="group flex items-center px-4 py-3 text-sm font-semibold rounded-xl transition-all {{if eq .Page "calendar"}}bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400 shadow-sm{{else}}text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white{{end}}">
                            <i data-lucide="calendar"
                                class="w-5 h-5 mr-3 transition-transform group-hover:scale-110"></i>
                            カレンダー連携
                        </a>
                        <a href="/settings"
                            class="group flex items-center px-4 py-3 text-sm font-semibold rounded-xl transition-all {{if eq .Page "settings"}}bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400 shadow-sm{{else}}text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white{{end}}">
                            <i data-lucide="settings"
                                class="w-5 h-5 mr-3 transition-transform group-hover:scale-110"></i>
                            システム設定
                        </a>
                    </nav>
                </div>

                <div class="pt-6 border-t border-slate-100 dark:border-slate-800">
                    <div
                        class="px-4 py-4 rounded-2xl bg-slate-50 dark:bg-slate-800/50 border border-slate-100 dark:border-slate-800">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="relative">
                                <div class="w-2.5 h-2.5 rounded-full bg-green-500 shadow-lg shadow-green-500/50"></div>
                                <div
                                    class="absolute inset-0 w-2.5 h-2.5 rounded-full bg-green-500 animate-ping opacity-75">
                                </div>
                            </div>
                            <span class="text-xs font-bold text-slate-700 dark:text-slate-300">SYSTEM ONLINE</span>
                        </div>
                        <p class="text-[10px] text-slate-500 dark:text-slate-500 uppercase tracking-widest font-bold">
                            Version 1.2.5</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Content Area -->
        <main class="flex-1 overflow-y-auto relative">
            <header
                class="h-20 glass border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-8 sticky top-0 z-40 transition-colors duration-300">
                <button @click="sidebarOpen = true"
                    class="lg:hidden p-2 -ml-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>

                <div class="flex-1 ml-4 lg:ml-0">
                    <h2 class="text-sm font-medium text-slate-400 dark:text-slate-500">Welcome back, Admin</h2>
                </div>

                <div class="flex items-center gap-3">
                    <!-- Light/Dark Toggle -->
                    <button @click="darkMode = !darkMode; localStorage.setItem('darkMode', darkMode)"
                        class="p-2.5 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all duration-300">
                        <i x-show="!darkMode" data-lucide="moon" class="w-5 h-5"></i>
                        <i x-show="darkMode" data-lucide="sun" class="w-5 h-5" x-cloak></i>
                    </button>

                    <div class="w-px h-6 bg-slate-200 dark:bg-slate-800 mx-2"></div>

                    <button
                        class="p-2.5 text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all relative">
                        <i data-lucide="bell" class="w-5 h-5"></i>
                        <span
                            class="absolute top-2.5 right-2.5 w-2 h-2 bg-rose-500 rounded-full border-2 border-white dark:border-slate-900"></span>
                    </button>

                    <button
                        class="flex items-center gap-3 ml-2 p-1 pl-1 pr-3 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors group">
                        <div
                            class="h-9 w-9 rounded-full bg-gradient-to-tr from-primary-600 to-indigo-500 p-0.5 border-2 border-white dark:border-slate-800 shadow-md">
                            <div
                                class="w-full h-full rounded-full bg-white dark:bg-slate-900 flex items-center justify-center text-primary-600 font-bold text-sm">
                                AD
                            </div>
                        </div>
                        <i data-lucide="chevron-down"
                            class="w-4 h-4 text-slate-400 group-hover:text-slate-600 dark:group-hover:text-slate-200 transition-colors"></i>
                    </button>
                </div>
            </header>

            <div class="p-8 max-w-7xl mx-auto">
                <div class="mb-8" x-transition>
                    {{template "content" .}}
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-8 right-8 z-[60] flex flex-col gap-4"></div>

    <script>
        lucide.createIcons();
        document.body.addEventListener('htmx:afterOnLoad', function (evt) {
            lucide.createIcons();
        });

        // Toast Handler
        document.body.addEventListener('showToast', function (evt) {
            const message = evt.detail.value;
            const toast = document.createElement('div');
            toast.className = 'bg-white dark:bg-slate-800 border-l-4 border-primary-600 p-5 shadow-2xl rounded-xl flex items-center gap-4 border border-slate-100 dark:border-slate-700 transform transition-all translate-x-12 opacity-0 duration-500 ease-out';
            toast.innerHTML = `
                <div class="p-2 bg-primary-50 dark:bg-primary-900/30 rounded-full">
                    <i data-lucide="check-circle" class="text-primary-600 dark:text-primary-400 w-5 h-5"></i>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-bold text-slate-800 dark:text-slate-100">Success</p>
                    <p class="text-xs text-slate-500 dark:text-slate-400">${message}</p>
                </div>
                <button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><i data-lucide="x" class="w-4 h-4"></i></button>
            `;
            document.getElementById('toast-container').appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.classList.remove('translate-x-12', 'opacity-0');
            }, 10);

            setTimeout(() => {
                toast.classList.add('translate-x-12', 'opacity-0');
                setTimeout(() => toast.remove(), 500);
            }, 5000);
        });
    </script>
</body>

</html>
