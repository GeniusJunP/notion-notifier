{{define "title"}}システム設定 - Notion Notifier{{end}}

{{define "content"}}
<div class="space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight dark:text-white">システム設定</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-1">Notionプロパティのマッピングとセキュリティを設定します。</p>
        </div>
        <button type="submit" form="settings-form"
            class="bg-primary-600 dark:bg-primary-500 text-white px-8 py-3 rounded-2xl text-sm font-bold hover:bg-primary-700 dark:hover:bg-primary-600 shadow-xl shadow-primary-500/25 transition-all hover:scale-105 active:scale-95 flex items-center justify-center gap-2 group">
            <i data-lucide="save" class="w-4 h-4"></i>
            設定を保存
        </button>
    </div>

    <form id="settings-form" hx-post="/api/config" hx-ext="json-enc" hx-swap="none" hx-indicator="#save-indicator"
        class="space-y-10">
        <!-- Notion Property Mapping Section -->
        <section class="space-y-6">
            <h2 class="text-xl font-bold flex items-center gap-3">
                <div class="p-2 bg-indigo-100 dark:bg-indigo-900/30 rounded-xl">
                    <i data-lucide="database" class="w-5 h-5 text-indigo-600 dark:text-indigo-400"></i>
                </div>
                Notion プロパティマッピング
            </h2>

            <div
                class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] border border-slate-200 dark:border-slate-800 shadow-sm space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="space-y-3">
                        <label
                            class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">タイトル</label>
                        <input type="text" name="property_mapping.title" value="{{.Config.PropertyMap.Title}}"
                            class="w-full px-5 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 outline-none transition-all font-bold">
                    </div>
                    <div class="space-y-3">
                        <label
                            class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">日付</label>
                        <input type="text" name="property_mapping.date" value="{{.Config.PropertyMap.Date}}"
                            class="w-full px-5 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 outline-none transition-all font-bold">
                    </div>
                    <div class="space-y-3">
                        <label
                            class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">場所</label>
                        <input type="text" name="property_mapping.location" value="{{.Config.PropertyMap.Location}}"
                            class="w-full px-5 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 outline-none transition-all font-bold">
                    </div>
                </div>

                <!-- Custom Mapping with Alpine.js -->
                <div x-data="{ custom: {{ .Config.PropertyMap.Custom | json }} }"
                    class="space-y-6 pt-8 border-t border-slate-100 dark:border-slate-800">
                    <div class="flex items-center justify-between">
                        <h3 class="text-xs font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">
                            カスタムマッピング</h3>
                        <button @click="custom.push({variable: '', property: ''})" type="button"
                            class="text-xs font-bold text-primary-600 dark:text-primary-400 hover:bg-primary-50 dark:hover:bg-primary-900/20 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                            <i data-lucide="plus" class="w-3 h-3"></i>
                            マッピングを追加
                        </button>
                    </div>

                    <div class="space-y-3">
                        <template x-for="(item, index) in custom" :key="index">
                            <div class="flex items-center gap-4 group p-2 hover:bg-slate-50 dark:hover:bg-slate-800/50 rounded-2xl transition-colors"
                                x-transition:enter="transition ease-out duration-200"
                                x-transition:enter-start="opacity-0 -translate-x-2"
                                x-transition:enter-end="opacity-100 translate-x-0">
                                <div class="flex-1 space-y-1">
                                    <input type="text" :name="'property_mapping.custom['+index+'].variable'"
                                        x-model="item.variable" placeholder="変数名 (テンプレート内で使用)"
                                        class="w-full px-4 py-2 bg-transparent border-b border-slate-200 dark:border-slate-800 focus:border-primary-500 outline-none transition-all text-sm font-bold">
                                </div>
                                <i data-lucide="arrow-right" class="w-4 h-4 text-slate-300"></i>
                                <div class="flex-1 space-y-1">
                                    <input type="text" :name="'property_mapping.custom['+index+'].property'"
                                        x-model="item.property" placeholder="Notionプロパティ名"
                                        class="w-full px-4 py-2 bg-transparent border-b border-slate-200 dark:border-slate-800 focus:border-primary-500 outline-none transition-all text-sm font-bold">
                                </div>
                                <button @click="custom.splice(index, 1)" type="button"
                                    class="p-2 text-slate-300 hover:text-rose-500 transition-colors opacity-0 group-hover:opacity-100">
                                    <i data-lucide="x" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </section>

        <!-- Security Section -->
        <section class="space-y-6">
            <h2 class="text-xl font-bold flex items-center gap-3">
                <div class="p-2 bg-rose-100 dark:bg-rose-900/30 rounded-xl">
                    <i data-lucide="shield-lock" class="w-5 h-5 text-rose-600 dark:text-rose-400"></i>
                </div>
                セキュリティ
            </h2>

            <div class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] border border-slate-200 dark:border-slate-800 shadow-sm"
                x-data="{ enabled: {{.Config.Security.BasicAuth.Enabled}} }">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                    <div class="lg:col-span-3">
                        <label
                            class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-4">BASIC認証</label>
                        <div class="flex items-center gap-4">
                            <button type="button" @click="enabled = !enabled"
                                :class="enabled ? 'bg-rose-600' : 'bg-slate-200 dark:bg-slate-700'"
                                class="relative inline-flex h-8 w-14 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-300 ease-in-out">
                                <span :class="enabled ? 'translate-x-6' : 'translate-x-0'"
                                    class="pointer-events-none inline-block h-7 w-7 transform rounded-full bg-white shadow-xl ring-0 transition duration-300 ease-in-out"></span>
                            </button>
                            <span class="text-sm font-black text-slate-700 dark:text-slate-300"
                                x-text="enabled ? 'ENABLED' : 'DISABLED'"></span>
                            <input type="hidden" name="security.basic_auth.enabled" :value="enabled">
                        </div>
                    </div>

                    <div class="lg:col-span-9 grid grid-cols-1 md:grid-cols-2 gap-8" x-show="enabled" x-collapse
                        x-cloak>
                        <div class="space-y-3">
                            <label
                                class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">ユーザー名</label>
                            <div class="relative">
                                <i data-lucide="user" class="absolute left-4 top-3.5 w-5 h-5 text-slate-300"></i>
                                <input type="text" name="security.basic_auth.username"
                                    value="{{.Config.Security.BasicAuth.Username}}"
                                    class="w-full pl-12 pr-5 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-4 focus:ring-rose-500/10 focus:border-rose-500 outline-none transition-all font-bold">
                            </div>
                        </div>
                        <div class="space-y-3">
                            <label
                                class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">パスワード</label>
                            <div class="relative">
                                <i data-lucide="key" class="absolute left-4 top-3.5 w-5 h-5 text-slate-300"></i>
                                <input type="password" name="security.basic_auth.password"
                                    value="{{.Config.Security.BasicAuth.Password}}"
                                    class="w-full pl-12 pr-5 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-4 focus:ring-rose-500/10 focus:border-rose-500 outline-none transition-all font-bold">
                            </div>
                        </div>
                    </div>
                </div>

                <div x-show="!enabled"
                    class="mt-8 p-6 bg-slate-50 dark:bg-slate-800/40 rounded-2xl border border-dashed border-slate-200 dark:border-slate-700 flex items-center gap-4">
                    <i data-lucide="info" class="w-5 h-5 text-slate-400"></i>
                    <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">
                        BASIC認証が無効な場合、管理画面は誰でもアクセス可能になります。公開環境では有効にすることを強く推奨します。</p>
                </div>
            </div>
        </section>
    </form>

    <div id="save-indicator"
        class="htmx-indicator fixed top-4 right-4 bg-white dark:bg-slate-800 px-4 py-2 rounded-full shadow-2xl border border-slate-100 dark:border-slate-800 flex items-center gap-2 z-[100]">
        <i data-lucide="loader-2" class="w-4 h-4 animate-spin text-primary-600"></i>
        <span class="text-xs font-bold text-slate-600 dark:text-slate-300">Saving...</span>
    </div>
</div>
{{end}}
