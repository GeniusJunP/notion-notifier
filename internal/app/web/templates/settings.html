{{define "content-settings"}}
<div class="space-y-10 animate-in fade-in slide-in-from-bottom-4 duration-500">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight dark:text-white">システム設定</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-1">Notionプロパティのマッピングとセキュリティを設定します。</p>
        </div>
        <button type="submit" form="settings-form"
            class="bg-primary-600 dark:bg-primary-500 text-white px-8 py-3 rounded-2xl text-sm font-bold hover:bg-primary-700 dark:hover:bg-primary-600 shadow-xl shadow-primary-500/25 transition-all hover:scale-105 active:scale-95 flex items-center justify-center gap-2 group">
            <i data-lucide="save" class="w-4 h-4"></i>
            設定を保存
        </button>
    </div>

    <form id="settings-form" hx-post="/api/config" hx-ext="json-enc" hx-swap="none" hx-indicator="#save-indicator"
        class="space-y-10">
        <!-- Notion Property Mapping Section -->
        <section class="space-y-6">
            <h2 class="text-xl font-bold flex items-center gap-3">
                <div class="p-2 bg-indigo-100 dark:bg-indigo-900/30 rounded-xl">
                    <i data-lucide="database" class="w-5 h-5 text-indigo-600 dark:text-indigo-400"></i>
                </div>
                Notion プロパティマッピング
            </h2>

            <div
                class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] border border-slate-200 dark:border-slate-800 shadow-sm space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="space-y-3">
                        <label
                            class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">タイトル</label>
                        <input type="text" name="property_mapping.title" value="{{.Config.PropertyMap.Title}}"
                            class="w-full px-5 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 outline-none transition-all font-bold">
                    </div>
                    <div class="space-y-3">
                        <label
                            class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">日付</label>
                        <input type="text" name="property_mapping.date" value="{{.Config.PropertyMap.Date}}"
                            class="w-full px-5 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 outline-none transition-all font-bold">
                    </div>
                    <div class="space-y-3">
                        <label
                            class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">場所</label>
                        <input type="text" name="property_mapping.location" value="{{.Config.PropertyMap.Location}}"
                            class="w-full px-5 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-4 focus:ring-primary-500/10 focus:border-primary-500 outline-none transition-all font-bold">
                    </div>
                </div>

                <!-- Custom Mapping -->
                <div x-data="{ custom: {{ .Config.PropertyMap.Custom | json }} }"
                    class="space-y-6 pt-8 border-t border-slate-100 dark:border-slate-800">
                    <input type="hidden" name="property_mapping.custom_clear" :value="custom.length === 0">
                    <div class="flex items-center justify-between">
                        <h3 class="text-xs font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">
                            カスタムマッピング</h3>
                        <button @click="custom.push({variable: '', property: ''})" type="button"
                            class="text-xs font-bold text-primary-600 dark:text-primary-400 hover:bg-primary-50 dark:hover:bg-primary-900/20 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                            <i data-lucide="plus" class="w-3 h-3"></i>
                            マッピングを追加
                        </button>
                    </div>

                    <div class="space-y-3">
                        <template x-for="(item, index) in custom" :key="index">
                            <div class="flex items-center gap-4 p-2 hover:bg-slate-50 dark:hover:bg-slate-800/50 rounded-2xl transition-colors"
                                x-transition:enter="transition ease-out duration-200"
                                x-transition:enter-start="opacity-0 -translate-x-2"
                                x-transition:enter-end="opacity-100 translate-x-0">
                                <div class="flex-1 space-y-1">
                                    <input type="text" :name="'property_mapping.custom['+index+'].variable'"
                                        x-model="item.variable" placeholder="変数名 (テンプレート内で使用)"
                                        class="w-full px-4 py-2 bg-transparent border-b border-slate-200 dark:border-slate-800 focus:border-primary-500 outline-none transition-all text-sm font-bold">
                                </div>
                                <i data-lucide="arrow-right" class="w-4 h-4 text-slate-300"></i>
                                <div class="flex-1 space-y-1">
                                    <input type="text" :name="'property_mapping.custom['+index+'].property'"
                                        x-model="item.property" placeholder="Notionプロパティ名"
                                        class="w-full px-4 py-2 bg-transparent border-b border-slate-200 dark:border-slate-800 focus:border-primary-500 outline-none transition-all text-sm font-bold">
                                </div>
                                <button @click="custom.splice(index, 1)" type="button"
                                    class="px-2.5 py-1.5 text-xs font-bold text-rose-600 hover:text-rose-700 hover:bg-rose-50 dark:hover:bg-rose-900/20 rounded-lg transition-colors">
                                    削除
                                </button>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </section>

        <section class="space-y-6">
            <h2 class="text-xl font-bold flex items-center gap-3">
                <div class="p-2 bg-amber-100 dark:bg-amber-900/30 rounded-xl">
                    <i data-lucide="highlighter" class="w-5 h-5 text-amber-600 dark:text-amber-400"></i>
                </div>
                コンテンツ抽出ルール
            </h2>

            <div class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] border border-slate-200 dark:border-slate-800 shadow-sm space-y-8"
                x-data="{ includeStart: {{.Config.ContentRules.IncludeStart}}, stopNext: {{.Config.ContentRules.StopAtNextHeading}}, stopDelimiter: {{.Config.ContentRules.StopAtDelimiter}} }">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-3">
                        <label
                            class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">開始見出し</label>
                        <input type="text" name="content_rules.start_heading" value="{{.Config.ContentRules.StartHeading}}"
                            class="w-full px-5 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-4 focus:ring-amber-500/10 focus:border-amber-500 outline-none transition-all font-bold"
                            placeholder="例: 活動内容">
                        <p class="text-xs text-slate-500 dark:text-slate-400">この見出し以降の本文を抽出します。</p>
                        <p class="text-xs text-slate-500 dark:text-slate-400">抽出した本文はテンプレート内で <code class="font-mono text-[11px]">{{"{{.Content}}"}}</code> として参照できます。</p>
                    </div>
                    <div class="space-y-3">
                        <label
                            class="block text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">区切り文字</label>
                        <input type="text" name="content_rules.delimiter_text" value="{{.Config.ContentRules.DelimiterText}}"
                            class="w-full px-5 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-4 focus:ring-amber-500/10 focus:border-amber-500 outline-none transition-all font-bold"
                            placeholder="例: ---">
                        <p class="text-xs text-slate-500 dark:text-slate-400">本文中でこの文字列が出たら抽出を停止します。</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="flex items-center justify-between p-4 rounded-2xl border border-slate-200 dark:border-slate-800">
                        <div>
                            <p class="text-xs font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest">見出しを含める</p>
                            <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">開始見出し行も本文に含める</p>
                        </div>
                        <button type="button" @click="includeStart = !includeStart"
                            :class="includeStart ? 'bg-amber-600' : 'bg-slate-200 dark:bg-slate-700'"
                            class="relative inline-flex h-7 w-12 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-300 ease-in-out">
                            <span :class="includeStart ? 'translate-x-5' : 'translate-x-0'"
                                class="pointer-events-none inline-block h-6 w-6 transform rounded-full bg-white shadow-lg ring-0 transition duration-300 ease-in-out"></span>
                        </button>
                        <input type="hidden" name="content_rules.include_start_heading" :value="includeStart">
                    </div>

                    <div class="flex items-center justify-between p-4 rounded-2xl border border-slate-200 dark:border-slate-800">
                        <div>
                            <p class="text-xs font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest">次の見出しで停止</p>
                            <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">次の見出しが出たら終了</p>
                        </div>
                        <button type="button" @click="stopNext = !stopNext"
                            :class="stopNext ? 'bg-amber-600' : 'bg-slate-200 dark:bg-slate-700'"
                            class="relative inline-flex h-7 w-12 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-300 ease-in-out">
                            <span :class="stopNext ? 'translate-x-5' : 'translate-x-0'"
                                class="pointer-events-none inline-block h-6 w-6 transform rounded-full bg-white shadow-lg ring-0 transition duration-300 ease-in-out"></span>
                        </button>
                        <input type="hidden" name="content_rules.stop_at_next_heading" :value="stopNext">
                    </div>

                    <div class="flex items-center justify-between p-4 rounded-2xl border border-slate-200 dark:border-slate-800">
                        <div>
                            <p class="text-xs font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest">区切りで停止</p>
                            <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">区切り記号が出たら終了</p>
                        </div>
                        <button type="button" @click="stopDelimiter = !stopDelimiter"
                            :class="stopDelimiter ? 'bg-amber-600' : 'bg-slate-200 dark:bg-slate-700'"
                            class="relative inline-flex h-7 w-12 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-300 ease-in-out">
                            <span :class="stopDelimiter ? 'translate-x-5' : 'translate-x-0'"
                                class="pointer-events-none inline-block h-6 w-6 transform rounded-full bg-white shadow-lg ring-0 transition duration-300 ease-in-out"></span>
                        </button>
                        <input type="hidden" name="content_rules.stop_at_delimiter" :value="stopDelimiter">
                    </div>
                </div>
            </div>
        </section>
    </form>

    <div id="save-indicator"
        class="htmx-indicator fixed top-4 right-4 bg-white dark:bg-slate-800 px-4 py-2 rounded-full shadow-2xl border border-slate-100 dark:border-slate-800 flex items-center gap-2 z-[100]">
        <i data-lucide="loader-2" class="w-4 h-4 animate-spin text-primary-600"></i>
        <span class="text-xs font-bold text-slate-600 dark:text-slate-300">Saving...</span>
    </div>
</div>
{{end}}
