name: Release Builds

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          - os: windows
            arch: amd64
            ext: ".exe"
          - os: windows
            arch: arm64
            ext: ".exe"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (for Web UI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build Web UI
        working-directory: ./web
        run: |
          npm ci
          npm run build

      - name: Build Go Binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          go build -o build/notion-notifier-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} ./cmd/notion-notifier

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/notion-notifier-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}
